services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: ${APP_PORT}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      CORS_ORIGIN: ${CORS_ORIGIN}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      SEED_GARAGE_NAME: ${SEED_GARAGE_NAME:-}
      SEED_USER1_EMAIL: ${SEED_USER1_EMAIL:-}
      SEED_USER2_EMAIL: ${SEED_USER2_EMAIL:-}
      SEED_GARAGES: ${SEED_GARAGES:-}
      SEED_PASSWORD: ${SEED_PASSWORD}
      FUEL_PRICE_PROVIDER: ${FUEL_PRICE_PROVIDER:-tankerkoenig}
      TANKERKOENIG_API_KEY: ${TANKERKOENIG_API_KEY:-}
      TANKERKOENIG_STATION_IDS: ${TANKERKOENIG_STATION_IDS:-}
      TANKERKOENIG_STATION_IDS_BY_GARAGE: ${TANKERKOENIG_STATION_IDS_BY_GARAGE:-}
      FUEL_PRICE_CHEAP_THRESHOLD_PCT: ${FUEL_PRICE_CHEAP_THRESHOLD_PCT:-5}
      FUEL_PRICE_CACHE_MINUTES: ${FUEL_PRICE_CACHE_MINUTES:-180}
      FUEL_PRICE_BACKGROUND_SNAPSHOTS: ${FUEL_PRICE_BACKGROUND_SNAPSHOTS:-false}
    ports:
      - "${APP_PORT}:3000"
    volumes:
      - ./data:/data

  frontend:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "8181:80"
    volumes:
      - .:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pgdata:
